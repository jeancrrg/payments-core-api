# =============================================================
# Common configuration (loaded for all profiles)
# Profile-specific overrides live in application-{profile}.properties
# Switch profile via SPRING_PROFILES_ACTIVE=prod|test
# =============================================================
spring.application.name=payments-core-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:test}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# JPA (common defaults)
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway (common defaults)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Stripe
stripe.api.key=${STRIPE_API_KEY:sk_test_replace_me}
stripe.api.connect-timeout-ms=10000
stripe.api.read-timeout-ms=30000

# Async / Thread pool
async.executor.core-pool-size=5
async.executor.max-pool-size=20
async.executor.queue-capacity=100
async.executor.thread-name-prefix=payments-async-

# Cache TTLs (seconds)
cache.ttl.customer-payments=300
cache.ttl.payment-by-id=600
cache.ttl.refund-by-id=600

# Resilience4j - Stripe API retry
resilience4j.retry.instances.stripeApi.max-attempts=3
resilience4j.retry.instances.stripeApi.wait-duration=500ms
resilience4j.retry.instances.stripeApi.exponential-backoff-multiplier=2
resilience4j.retry.instances.stripeApi.retry-exceptions[0]=com.stripe.exception.ApiConnectionException
resilience4j.retry.instances.stripeApi.retry-exceptions[1]=com.stripe.exception.RateLimitException
resilience4j.retry.instances.stripeApi.retry-exceptions[2]=com.billing.payments_core_api.exception.StripeIntegrationException

# Resilience4j - Circuit breaker for Stripe
resilience4j.circuitbreaker.instances.stripeApi.sliding-window-size=10
resilience4j.circuitbreaker.instances.stripeApi.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.stripeApi.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.stripeApi.permitted-number-of-calls-in-half-open-state=3

# Springdoc / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.show-actuator=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Logging
logging.level.root=INFO
logging.level.com.billing.payments_core_api=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n
